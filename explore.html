<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore • Instagram</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/800px-Instagram_logo.svg.png" alt="Instagram" class="logo-img"/></a>
      </div>
      <div class="nav-search">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search" class="search-input" id="exploreSearch" oninput="filterExplore(this.value)"/>
      </div>
      <div class="nav-icons">
        <a href="index.html" class="nav-icon" title="Home"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-icon" title="Messages"><i class="fas fa-paper-plane"></i></a>
        <a href="explore.html" class="nav-icon active" title="Explore"><i class="fas fa-compass"></i></a>
        <a href="#" class="nav-icon" title="Reels"><i class="fas fa-film"></i></a>
        <a href="#" class="nav-icon" title="Notifications"><i class="fas fa-heart"></i></a>
        <a href="profile.html" class="nav-icon" title="Profile">
          <img src="https://i.pravatar.cc/32?img=5" alt="Profile" class="nav-avatar"/>
        </a>
      </div>
    </div>
  </nav>

  <!-- EXPLORE PAGE -->
  <div class="explore-page">

    <!-- CATEGORY TAGS -->
    <div class="explore-tags" id="exploreTags">
      <button class="explore-tag active" onclick="filterByTag('all', this)">All</button>
      <button class="explore-tag" onclick="filterByTag('travel', this)">✈️ Travel</button>
      <button class="explore-tag" onclick="filterByTag('food', this)">🍜 Food</button>
      <button class="explore-tag" onclick="filterByTag('nature', this)">🌿 Nature</button>
      <button class="explore-tag" onclick="filterByTag('city', this)">🏙️ City</button>
      <button class="explore-tag" onclick="filterByTag('art', this)">🎨 Art</button>
      <button class="explore-tag" onclick="filterByTag('fashion', this)">👗 Fashion</button>
      <button class="explore-tag" onclick="filterByTag('sports', this)">⚽ Sports</button>
      <button class="explore-tag" onclick="filterByTag('music', this)">🎵 Music</button>
    </div>

    <!-- EXPLORE GRID -->
    <div class="explore-grid" id="exploreGrid">
      <!-- Injected by JS -->
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <style>
    .explore-tags {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 16px;
      margin-bottom: 8px;
      scrollbar-width: none;
    }
    .explore-tags::-webkit-scrollbar { display: none; }

    .explore-tag {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      color: var(--text-primary);
    }

    .explore-tag:hover { background: #f0f0f0; }
    .explore-tag.active {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    .explore-item {
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .explore-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s, filter 0.2s;
    }

    .explore-item:hover img {
      transform: scale(1.03);
      filter: brightness(0.75);
    }

    .explore-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.2s;
      color: white;
      font-weight: 600;
      font-size: 15px;
    }

    .explore-item:hover .explore-item-overlay { opacity: 1; }

    .explore-item-overlay span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Featured item (large) */
    .explore-item.featured {
      grid-column: span 2;
      grid-row: span 2;
    }

    .explore-item img {
      aspect-ratio: 1;
    }

    .explore-item.featured img {
      aspect-ratio: 1;
      height: 100%;
    }
  </style>

  <script>
    const exploreData = [
      { id: 1, src: "https://picsum.photos/seed/ex1/600/600", likes: 12430, comments: 184, tags: ["travel", "nature"], user: "alex_photo", featured: true },
      { id: 2, src: "https://picsum.photos/seed/ex2/300/300", likes: 8920, comments: 120, tags: ["food"], user: "foodie_gram" },
      { id: 3, src: "https://picsum.photos/seed/ex3/300/300", likes: 34210, comments: 450, tags: ["city", "art"], user: "city_shots" },
      { id: 4, src: "https://picsum.photos/seed/ex4/300/300", likes: 5670, comments: 80, tags: ["nature"], user: "nature_lens" },
      { id: 5, src: "https://picsum.photos/seed/ex5/300/300", likes: 21340, comments: 310, tags: ["travel"], user: "travel_vibes" },
      { id: 6, src: "https://picsum.photos/seed/ex6/300/300", likes: 7890, comments: 140, tags: ["fashion"], user: "style_queen" },
      { id: 7, src: "https://picsum.photos/seed/ex7/600/600", likes: 15670, comments: 220, tags: ["sports", "nature"], user: "mountain_hiker", featured: true },
      { id: 8, src: "https://picsum.photos/seed/ex8/300/300", likes: 4320, comments: 60, tags: ["food", "art"], user: "coffee_art" },
      { id: 9, src: "https://picsum.photos/seed/ex9/300/300", likes: 28900, comments: 380, tags: ["city"], user: "urban_explorer" },
      { id: 10, src: "https://picsum.photos/seed/ex10/300/300", likes: 11020, comments: 170, tags: ["music", "art"], user: "music_vibes" },
      { id: 11, src: "https://picsum.photos/seed/ex11/300/300", likes: 6780, comments: 90, tags: ["fashion"], user: "street_style" },
      { id: 12, src: "https://picsum.photos/seed/ex12/300/300", likes: 32100, comments: 520, tags: ["travel", "nature"], user: "sunset_lover" },
      { id: 13, src: "https://picsum.photos/seed/ex13/300/300", likes: 9450, comments: 130, tags: ["food"], user: "foodie_gram" },
      { id: 14, src: "https://picsum.photos/seed/ex14/600/600", likes: 17890, comments: 260, tags: ["city", "travel"], user: "city_shots", featured: true },
      { id: 15, src: "https://picsum.photos/seed/ex15/300/300", likes: 5230, comments: 70, tags: ["sports"], user: "fitness_life" },
      { id: 16, src: "https://picsum.photos/seed/ex16/300/300", likes: 24560, comments: 340, tags: ["nature"], user: "nature_lens" },
      { id: 17, src: "https://picsum.photos/seed/ex17/300/300", likes: 8670, comments: 110, tags: ["art", "music"], user: "creative_soul" },
      { id: 18, src: "https://picsum.photos/seed/ex18/300/300", likes: 13450, comments: 190, tags: ["travel"], user: "travel_vibes" },
    ];

    let currentTag = 'all';
    let currentSearch = '';

    function renderExplore(items) {
      const grid = document.getElementById('exploreGrid');
      if (items.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-secondary);">
          <i class="fas fa-search" style="font-size:48px;margin-bottom:16px;display:block;"></i>
          <h3 style="font-size:20px;font-weight:300;margin-bottom:8px;">No results found</h3>
          <p>Try a different search or category</p>
        </div>`;
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="explore-item ${item.featured ? 'featured' : ''}" onclick="showToast('@${item.user} · ${item.likes.toLocaleString()} likes')">
          <img src="${item.src}" alt="Explore" loading="lazy"/>
          <div class="explore-item-overlay">
            <span><i class="fas fa-heart"></i> ${item.likes.toLocaleString()}</span>
            <span><i class="fas fa-comment"></i> ${item.comments}</span>
          </div>
        </div>
      `).join('');
    }

    function filterByTag(tag, btn) {
      currentTag = tag;
      document.querySelectorAll('.explore-tag').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function filterExplore(query) {
      currentSearch = query.toLowerCase().trim();
      applyFilters();
    }

    function applyFilters() {
      let filtered = exploreData;
      if (currentTag !== 'all') {
        filtered = filtered.filter(item => item.tags.includes(currentTag));
      }
      if (currentSearch) {
        filtered = filtered.filter(item =>
          item.user.toLowerCase().includes(currentSearch) ||
          item.tags.some(t => t.includes(currentSearch))
        );
      }
      renderExplore(filtered);
    }

    // Toast
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Init
    renderExplore(exploreData);
  </script>
</body>
</html>
