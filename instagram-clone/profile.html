<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>jyosika_s • Instagram</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/800px-Instagram_logo.svg.png" alt="Instagram" class="logo-img"/></a>
      </div>
      <div class="nav-search">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search" class="search-input"/>
      </div>
      <div class="nav-icons">
        <a href="index.html" class="nav-icon" title="Home"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-icon" title="Messages"><i class="fas fa-paper-plane"></i></a>
        <a href="explore.html" class="nav-icon" title="Explore"><i class="fas fa-compass"></i></a>
        <a href="#" class="nav-icon" title="Reels"><i class="fas fa-film"></i></a>
        <a href="#" class="nav-icon" title="Notifications"><i class="fas fa-heart"></i></a>
        <a href="profile.html" class="nav-icon active" title="Profile">
          <img src="https://i.pravatar.cc/32?img=5" alt="Profile" class="nav-avatar"/>
        </a>
      </div>
    </div>
  </nav>

  <!-- PROFILE PAGE -->
  <div class="profile-page">

    <!-- PROFILE HEADER -->
    <div class="profile-header">
      <div class="profile-avatar-section">
        <div style="position:relative;display:inline-block;">
          <img src="https://i.pravatar.cc/150?img=5" alt="Profile" class="profile-avatar-large"/>
          <button onclick="showToast('Change photo feature coming soon!')" style="position:absolute;bottom:8px;right:8px;background:var(--primary);color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid white;">
            <i class="fas fa-camera"></i>
          </button>
        </div>
      </div>

      <div class="profile-info">
        <div class="profile-top-row">
          <span class="profile-username-text">jyosika_s</span>
          <button class="profile-edit-btn" onclick="showToast('Edit profile coming soon!')">Edit profile</button>
          <button class="profile-edit-btn" onclick="showToast('View archive coming soon!')">View archive</button>
          <button style="font-size:18px;color:var(--text-primary);" onclick="showToast('Settings coming soon!')">
            <i class="fas fa-cog"></i>
          </button>
        </div>

        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-num" id="postCount">24</span>
            <span class="profile-stat-label"> posts</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num" id="followerCount">1,284</span>
            <span class="profile-stat-label"> followers</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num">342</span>
            <span class="profile-stat-label"> following</span>
          </div>
        </div>

        <div class="profile-bio">
          <strong>Jyosika S</strong>
          📸 Photography & Travel Enthusiast<br/>
          🌍 Exploring the world one frame at a time<br/>
          ✨ Living life in full color<br/>
          <a href="#" style="color:var(--primary);">🔗 linktr.ee/jyosika_s</a>
        </div>
      </div>
    </div>

    <!-- HIGHLIGHTS -->
    <div class="stories-container" style="margin-bottom:24px;border:none;padding:0;background:transparent;">
      <div class="story">
        <div class="story-avatar-wrap" style="background:var(--border);">
          <img src="https://picsum.photos/seed/h1/56/56" alt="Travel" class="story-avatar" style="border:none;"/>
        </div>
        <span>Travel</span>
      </div>
      <div class="story">
        <div class="story-avatar-wrap" style="background:var(--border);">
          <img src="https://picsum.photos/seed/h2/56/56" alt="Food" class="story-avatar" style="border:none;"/>
        </div>
        <span>Food</span>
      </div>
      <div class="story">
        <div class="story-avatar-wrap" style="background:var(--border);">
          <img src="https://picsum.photos/seed/h3/56/56" alt="Nature" class="story-avatar" style="border:none;"/>
        </div>
        <span>Nature</span>
      </div>
      <div class="story">
        <div class="story-avatar-wrap" style="background:var(--border);">
          <img src="https://picsum.photos/seed/h4/56/56" alt="City" class="story-avatar" style="border:none;"/>
        </div>
        <span>City</span>
      </div>
      <div class="story">
        <div class="story-avatar-wrap" style="background:var(--border);">
          <img src="https://picsum.photos/seed/h5/56/56" alt="Sunsets" class="story-avatar" style="border:none;"/>
        </div>
        <span>Sunsets</span>
      </div>
      <div class="story" onclick="showToast('Add highlight coming soon!')">
        <div class="story-avatar-wrap" style="background:transparent;border:2px dashed var(--border);">
          <div style="width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-secondary);">
            <i class="fas fa-plus"></i>
          </div>
        </div>
        <span>New</span>
      </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
      <div class="profile-tab active" id="tab-posts" onclick="switchTab('posts')">
        <i class="fas fa-th"></i> POSTS
      </div>
      <div class="profile-tab" id="tab-reels" onclick="switchTab('reels')">
        <i class="fas fa-film"></i> REELS
      </div>
      <div class="profile-tab" id="tab-saved" onclick="switchTab('saved')">
        <i class="fas fa-bookmark"></i> SAVED
      </div>
      <div class="profile-tab" id="tab-tagged" onclick="switchTab('tagged')">
        <i class="fas fa-user-tag"></i> TAGGED
      </div>
    </div>

    <!-- GRID -->
    <div class="profile-grid" id="profileGrid">
      <!-- Injected by JS -->
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // Profile grid images
    const profileImages = [
      { src: "https://picsum.photos/seed/p1/300/300", likes: 1243, comments: 18 },
      { src: "https://picsum.photos/seed/p2/300/300", likes: 892, comments: 12 },
      { src: "https://picsum.photos/seed/p3/300/300", likes: 3421, comments: 45 },
      { src: "https://picsum.photos/seed/p4/300/300", likes: 567, comments: 8 },
      { src: "https://picsum.photos/seed/p5/300/300", likes: 2134, comments: 31 },
      { src: "https://picsum.photos/seed/p6/300/300", likes: 789, comments: 14 },
      { src: "https://picsum.photos/seed/p7/300/300", likes: 1567, comments: 22 },
      { src: "https://picsum.photos/seed/p8/300/300", likes: 432, comments: 6 },
      { src: "https://picsum.photos/seed/p9/300/300", likes: 2890, comments: 38 },
      { src: "https://picsum.photos/seed/p10/300/300", likes: 1102, comments: 17 },
      { src: "https://picsum.photos/seed/p11/300/300", likes: 678, comments: 9 },
      { src: "https://picsum.photos/seed/p12/300/300", likes: 3210, comments: 52 },
      { src: "https://picsum.photos/seed/p13/300/300", likes: 945, comments: 13 },
      { src: "https://picsum.photos/seed/p14/300/300", likes: 1789, comments: 26 },
      { src: "https://picsum.photos/seed/p15/300/300", likes: 523, comments: 7 },
      { src: "https://picsum.photos/seed/p16/300/300", likes: 2456, comments: 34 },
      { src: "https://picsum.photos/seed/p17/300/300", likes: 867, comments: 11 },
      { src: "https://picsum.photos/seed/p18/300/300", likes: 1345, comments: 19 },
      { src: "https://picsum.photos/seed/p19/300/300", likes: 4123, comments: 67 },
      { src: "https://picsum.photos/seed/p20/300/300", likes: 712, comments: 10 },
      { src: "https://picsum.photos/seed/p21/300/300", likes: 1987, comments: 28 },
      { src: "https://picsum.photos/seed/p22/300/300", likes: 634, comments: 8 },
      { src: "https://picsum.photos/seed/p23/300/300", likes: 2678, comments: 41 },
      { src: "https://picsum.photos/seed/p24/300/300", likes: 1123, comments: 16 },
    ];

    const savedImages = profileImages.slice(0, 6).map((img, i) => ({
      ...img,
      src: `https://picsum.photos/seed/saved${i+1}/300/300`
    }));

    const taggedImages = profileImages.slice(0, 9).map((img, i) => ({
      ...img,
      src: `https://picsum.photos/seed/tagged${i+1}/300/300`
    }));

    function renderGrid(images) {
      const grid = document.getElementById('profileGrid');
      grid.innerHTML = images.map(img => `
        <div class="profile-grid-item" onclick="showToast('${img.likes.toLocaleString()} likes · ${img.comments} comments')">
          <img src="${img.src}" alt="Post" loading="lazy"/>
          <div class="profile-grid-overlay">
            <span><i class="fas fa-heart"></i> ${img.likes.toLocaleString()}</span>
            <span><i class="fas fa-comment"></i> ${img.comments}</span>
          </div>
        </div>
      `).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');

      if (tab === 'posts') renderGrid(profileImages);
      else if (tab === 'reels') {
        const grid = document.getElementById('profileGrid');
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-secondary);">
          <i class="fas fa-film" style="font-size:48px;margin-bottom:16px;display:block;"></i>
          <h3 style="font-size:20px;font-weight:300;margin-bottom:8px;">No Reels Yet</h3>
          <p>Share your first reel</p>
        </div>`;
      }
      else if (tab === 'saved') renderGrid(savedImages);
      else if (tab === 'tagged') renderGrid(taggedImages);
    }

    // Toast
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Init
    renderGrid(profileImages);
  </script>
</body>
</html>
